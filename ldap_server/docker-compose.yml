services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: ldap_study
    environment:
      LDAP_ORGANIZATION: "test"
      LDAP_DOMAIN: "tester.local"
      LDAP_ADMIN_PASSWORD: "sudo"
    ports:
      - "3890:389"
    volumes:
      - ./seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/seed.ldif
    command: --copy-service